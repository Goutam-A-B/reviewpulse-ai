# Render deploy (free web tier). Frontend goes to Vercel separately.
services:
  - type: web
    name: reviewpulse-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
