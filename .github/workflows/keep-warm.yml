# Free keep-warm: pings the backend health endpoint so the Render free tier does
# not cold-start on the first real request (PRD §11.1). A failed ping never fails
# the workflow (EC-P7-04). Set the BACKEND_HEALTH_URL repo secret to <backend>/health.
name: keep-warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -fsS "${{ secrets.BACKEND_HEALTH_URL }}" || exit 0
